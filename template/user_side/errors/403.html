{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>403 - Forbidden</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-10 max-w-lg w-full text-center">

        <!-- Icon -->
        <div class="text-yellow-500 text-7xl mb-4">
            🔒
        </div>

        <!-- Error Code -->
        <h1 class="text-5xl font-extrabold text-yellow-500 mb-4">403</h1>

        <!-- Title -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-2">
            Access Forbidden
        </h2>

        <!-- Message -->
        <p class="text-gray-600 mb-6">
            You do not have permission to access this page.
            Please contact the administrator if you believe this is a mistake.
        </p>

        <!-- Buttons -->
        <div class="flex justify-center gap-4">
            <a href="{% url 'home' %}"
               class="px-6 py-2 bg-black text-white rounded-lg hover:bg-gray-800 transition duration-300">
                Go Home
            </a>

            <button onclick="history.back()"
                class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition duration-300">
                Go Back
            </button>
        </div>

    </div>

</body>
</html>
